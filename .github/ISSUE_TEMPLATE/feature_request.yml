name: Feature request
description: Suggest a small, concrete improvement to PatchDeck.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult, slow, or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should PatchDeck do differently?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or simpler options have you tried?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Pull requests
        - Issues
        - Releases
        - Settings
        - Local API or MCP
        - Desktop app
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, or links that clarify the request.
