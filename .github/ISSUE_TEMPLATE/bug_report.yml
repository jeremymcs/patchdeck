name: Bug report
description: Report something in PatchDeck that is broken or surprising.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Start PatchDeck with ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PatchDeck version
      placeholder: "patchdeck --version"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.5, Ubuntu 24.04, Windows 11, ..."
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste only the relevant lines. Remove tokens, private URLs, and secrets.
      render: text
