<?xml version="1.0" encoding="UTF-8"?>
<!--
  macOS menu-bar template glyph. Only alpha matters: any non-transparent pixel
  renders in the bar's foreground color (black in light bar, white in dark bar).
  No background, no colored fills.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22" fill="none">
  <!-- Patch cable (drawn first so jacks render on top) -->
  <path
    d="M 5 5 Q 11 9 17 11"
    stroke="black"
    stroke-width="1.4"
    stroke-linecap="round"
    fill="none"/>

  <!-- Filled jacks: top-left and middle-right -->
  <circle cx="5"  cy="5"  r="2.2" fill="black"/>
  <circle cx="17" cy="11" r="2.2" fill="black"/>

  <!-- Outlined jacks -->
  <circle cx="11" cy="5"  r="1.6" stroke="black" stroke-width="1"/>
  <circle cx="17" cy="5"  r="1.6" stroke="black" stroke-width="1"/>
  <circle cx="5"  cy="11" r="1.6" stroke="black" stroke-width="1"/>
  <circle cx="11" cy="11" r="1.6" stroke="black" stroke-width="1"/>
  <circle cx="5"  cy="17" r="1.6" stroke="black" stroke-width="1"/>
  <circle cx="11" cy="17" r="1.6" stroke="black" stroke-width="1"/>
  <circle cx="17" cy="17" r="1.6" stroke="black" stroke-width="1"/>
</svg>
